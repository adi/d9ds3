name: release

# Build and publish the container image to GitHub Container Registry on tag push.
# Create a release with:  git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # ghcr.io/adi/d9ds3
          tags: |
            type=semver,pattern={{version}}          # v1.2.3 -> 1.2.3
            type=semver,pattern={{major}}.{{minor}}  # -> 1.2
            type=ref,event=tag                        # raw tag name (non-semver fallback)
          # default flavor latest=auto → also tags :latest for non-prerelease semver

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
