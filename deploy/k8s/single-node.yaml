# d9ds3 single-node (standalone): one process = storage node + gateway.
# Durable local storage, but NO replication/failover. Great for dev/CI/edge/small.
# Object data and Raft consensus state live on SEPARATE volumes on purpose:
# the Raft volume is node-local and must never be copied/restored independently.
#
#   kubectl apply -f single-node.yaml
#   # S3 at the Service; console at http://<svc>/console
apiVersion: v1
kind: Secret
metadata:
  name: d9ds3-root
stringData:
  access-key: admin
  secret-key: CHANGE-ME-strong-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: d9ds3-data          # object data — the backup/rsync surface (can be bulk storage)
spec:
  accessModes: ["ReadWriteOnce"]
  # storageClassName: bulk-hdd
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: d9ds3-state         # internal bookkeeping (versions/history/config/iam/staging)
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: d9ds3-raft          # Raft consensus state — small, fsync-heavy (put on SSD)
spec:
  accessModes: ["ReadWriteOnce"]
  # storageClassName: fast-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: d9ds3
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO volumes can't attach to two pods during a rollout
  selector:
    matchLabels:
      app: d9ds3
  template:
    metadata:
      labels:
        app: d9ds3
    spec:
      containers:
        - name: d9ds3
          image: ghcr.io/adi/d9ds3:latest   # GHCR, CI-published on tag; pin e.g. :0.1.0
          args:
            - standalone
            - --s3=:8080
            - --data=/data
            - --state-dir=/state
            - --raft-dir=/raft
            - --region=us-east-1
            - --root-access-key=$(ROOT_AK)
            - --root-secret=$(ROOT_SK)
          env:
            - name: ROOT_AK
              valueFrom: { secretKeyRef: { name: d9ds3-root, key: access-key } }
            - name: ROOT_SK
              valueFrom: { secretKeyRef: { name: d9ds3-root, key: secret-key } }
          ports:
            - containerPort: 8080
          readinessProbe:               # Ready only once the root account is live
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:                # process-alive
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }    # ONLY the browsable object tree (+ xattrs)
            - { name: state, mountPath: /state }  # versions/history/config/iam/staging
            - { name: raft, mountPath: /raft }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: d9ds3-data }
        - name: state
          persistentVolumeClaim: { claimName: d9ds3-state }
        - name: raft
          persistentVolumeClaim: { claimName: d9ds3-raft }
---
apiVersion: v1
kind: Service
metadata:
  name: d9ds3
spec:
  type: LoadBalancer        # or ClusterIP + Ingress
  selector:
    app: d9ds3
  ports:
    - port: 80
      targetPort: 8080
